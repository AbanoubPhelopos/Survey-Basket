<section class="page-wrapper pt-4">
  <div class="grid gap-6 auto-rows-max lg:grid-cols-12">
    <form class="sb-surface p-6 rounded-xl space-y-5 lg:col-span-5 h-fit" [formGroup]="form"
      (ngSubmit)="createRecord()">
      <label class="block">
        <span class="block text-sm font-semibold mb-1.5">Display Name</span>
        <input class="sb-input" formControlName="displayName" placeholder="Warehouse Supervisor" />
      </label>

      <label class="block">
        <span class="block text-sm font-semibold mb-1.5">Business Identifier</span>
        <input class="sb-input" formControlName="businessIdentifier" placeholder="EMP-1023" />
      </label>

      <button class="sb-btn-primary w-full mt-2" type="submit" [disabled]="loading()">
        {{ loading() ? 'Creating...' : 'Create Record' }}
      </button>

      @if (errorMessage()) {
      <p class="sb-error mt-2">{{ errorMessage() }}</p>
      }
    </form>

    <section class="sb-surface p-6 rounded-xl lg:col-span-7">
      <h2 class="font-bold text-lg mb-4 pb-2 border-b border-[var(--border)]">Created Records</h2>

      @if (records().length === 0) {
      <p class="sb-empty text-sm py-8">No company user records created in this session yet.</p>
      }

      <div class="space-y-3 mt-4">
        @for (record of records(); track record.companyUserRecordId) {
        <article
          class="flex items-center justify-between p-4 border border-[var(--border)] rounded-lg hover:bg-[var(--bg-soft)] transition-colors bg-[var(--bg-elevated)]">
          <div>
            <h3 class="font-bold text-base text-[var(--text)] mb-0.5">{{ record.displayName }}</h3>
            <p class="text-sm font-mono text-[var(--text-soft)]">{{ record.businessIdentifier }}</p>
          </div>
          <span
            class="px-2 py-1 rounded text-[0.65rem] font-bold uppercase tracking-wider bg-slate-100 text-slate-600 border border-slate-200">Non-auth</span>
        </article>
        }
      </div>
    </section>
  </div>
</section>
