<div class="shell" [class.is-mobile-open]="isMobileMenuOpen()">
  <!-- Mobile Header -->
  <header class="shell__mobile-header">
    <div class="shell__brand">
      <span class="shell__logo">SB</span>
      <p class="shell__title">Survey Basket</p>
    </div>
    <button type="button" class="shell__mobile-toggle" (click)="toggleMobileMenu()" aria-label="Toggle menu">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
  </header>

  <!-- Mobile Overlay -->
  @if (isMobileMenuOpen()) {
  <div class="shell__overlay" (click)="closeMobileMenu()" aria-hidden="true"></div>
  }

  <!-- Sidebar -->
  <aside class="shell__sidebar" [class.is-open]="isMobileMenuOpen()">
    <div class="shell__brand shell__brand--desktop">
      <span class="shell__logo">SB</span>
      <div>
        <p class="shell__title">Survey Basket</p>
        <p class="shell__subtitle">Workspace</p>
      </div>
    </div>

    <div class="shell__mobile-close">
      <div class="shell__brand">
        <span class="shell__logo">SB</span>
        <p class="shell__title">Menu</p>
      </div>
      <button type="button" class="shell__mobile-toggle" (click)="closeMobileMenu()" aria-label="Close menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <nav class="shell__nav" aria-label="Primary navigation">
      @for (item of navItems(); track item.route) {
      <a [routerLink]="item.route" routerLinkActive="is-active" class="shell__link" (click)="closeMobileMenu()">
        <span class="shell__dot" aria-hidden="true"></span>
        {{ item.label }}
      </a>
      }
    </nav>

    <div class="shell__footer">
      <div class="shell__user">
        <span class="shell__avatar">{{ getInitials(user()?.firstName, user()?.lastName) }}</span>
        <div>
          <p class="shell__name">{{ user()?.firstName }} {{ user()?.lastName }}</p>
          <p class="shell__email">{{ user()?.email }}</p>
        </div>
      </div>

      <div class="shell__actions">
        <button type="button" class="shell__action" (click)="toggleTheme()">
          <span class="shell__action-icon">
            @if (currentTheme() === 'dark') {
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5" />
              <path
                d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" />
            </svg>
            } @else {
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            }
          </span>
          <span>Theme</span>
        </button>
        <button type="button" class="shell__action shell__action--danger" (click)="logout()">
          <span class="shell__action-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
          </span>
          <span>Log out</span>
        </button>
      </div>
    </div>
  </aside>

  <main class="shell__content">
    <div class="shell__content-inner">
      <router-outlet />
    </div>
  </main>
</div>
